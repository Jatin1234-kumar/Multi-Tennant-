<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brutalist Landing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="progress-track" aria-hidden="true">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <main class="hero" id="hero">
      <section class="hero-inner">
        <h1 class="headline">BUILD SHARP. SHIP FAST.</h1>
        <p class="subtitle">A minimal workspace for modern teams that move with confidence.</p>

        <form class="cta-row" id="cta-form">
          <input type="email" placeholder="ENTER WORK EMAIL" aria-label="Email" required />
          <button type="submit">GET EARLY ACCESS</button>
        </form>

        <div class="profile-row" aria-hidden="true">
          <span class="avatar">AJ</span>
          <span class="avatar">RM</span>
          <span class="avatar">SK</span>
          <span class="avatar">+4K</span>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
